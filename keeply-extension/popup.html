<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b1120;
      color: #e2e8f0;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e293b;
    }
    .header svg { flex-shrink: 0; }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .status {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #475569;
    }
    .header .status.online { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }

    /* ── Sections ───────────────────────────── */
    .section { padding: 12px 16px; }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #64748b;
      margin-bottom: 8px;
    }

    /* ── Login form ─────────────────────────── */
    .form-group { margin-bottom: 10px; }
    .form-group label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #1e293b;
      border-radius: 6px;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #38bdf8; }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #0284c7, #6366f1);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-danger {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
    }
    .btn-danger:hover { background: #ef444418; }
    .btn-small {
      width: auto;
      padding: 5px 12px;
      font-size: 11px;
      border-radius: 5px;
    }

    /* ── Connected state ────────────────────── */
    .connected-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #22c55e12;
      border: 1px solid #22c55e30;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .connected-info span { font-size: 12px; color: #86efac; }

    /* ── Pending credentials ────────────────── */
    .cred-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .cred-card:hover { border-color: #38bdf8; }
    .cred-site {
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cred-user {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .cred-actions {
      display: flex;
      gap: 6px;
    }
    .btn-save {
      background: #0284c7;
      color: #fff;
    }
    .btn-save:hover { background: #0369a1; }
    .btn-dismiss {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
    }
    .btn-dismiss:hover { background: #47556920; }

    .empty-state {
      text-align: center;
      padding: 20px 10px;
      color: #64748b;
      font-size: 12px;
    }
    .empty-state svg { margin-bottom: 8px; opacity: 0.4; }

    .toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #22c55e;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ef4444; }

    .divider { border: none; border-top: 1px solid #1e293b; margin: 0; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L4 6v5c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V6l-8-4z" fill="#38bdf8"/>
      <circle cx="12" cy="11" r="2" fill="#0b1120"/>
      <rect x="11" y="12" width="2" height="4" rx="1" fill="#0b1120"/>
    </svg>
    <h1>Keeply</h1>
    <div class="status" id="status-dot"></div>
  </div>

  <!-- Login View -->
  <div id="view-login" class="section" style="display:none;">
    <div class="section-title">Connect to Vault</div>
    <div class="form-group">
      <label>Server URL</label>
      <input type="url" id="server-url" placeholder="https://keeply-o8ni.onrender.com" value="https://keeply-o8ni.onrender.com" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Master Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" id="login-btn">Link Extension</button>
    <p id="login-error" style="color:#ef4444; font-size:11px; margin-top:8px; display:none;"></p>
  </div>

  <!-- Connected View -->
  <div id="view-connected" class="section" style="display:none;">
    <div class="connected-info" style="display: flex; align-items: center; gap: 8px;">
      <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #22c55e; box-shadow: 0 0 6px #22c55e88;"></span>
      <span>Connected to Keeply</span>
    </div>

    <div class="section-title">Captured Credentials</div>
    <div id="cred-list"></div>

    <hr class="divider" style="margin: 10px 0;" />
    <button class="btn btn-danger btn-small" id="logout-btn" style="width:100%; margin-top: 4px;">Disconnect</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
