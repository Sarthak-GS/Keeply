{% extends "layout.html" %}
{% block title %}{{ status_code }} — Error | Vaultify{% endblock %}
{% block content %}
<div class="flex min-h-[70vh] flex-col items-center justify-center text-center">
    <div class="mb-4 text-6xl">{{ icon }}</div>
    <h1 class="mb-2 font-display text-4xl font-bold text-white">{{ status_code }}</h1>
    <p class="mb-2 text-lg font-semibold text-slate-300">{{ title }}</p>
    <p class="mb-6 max-w-md text-slate-400">{{ message }}</p>
    <a href="/" class="rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 px-6 py-3 text-sm font-bold text-white shadow-glow-cyan hover:opacity-90 transition">← Go Home</a>
</div>
{% endblock %}
