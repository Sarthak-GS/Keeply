{% extends "layout.html" %}
{% block title %}Forgot Password — Vaultify{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="rounded-[2rem] border border-white/10 bg-slate-900/80 p-8 shadow-glow backdrop-blur-xl">

            <!-- Logo -->
            <div class="mb-8 flex flex-col items-center gap-3">
                <div class="flex h-16 w-16 items-center justify-center rounded-full bg-cyan-400/10 border border-cyan-400/20 shadow-[0_0_30px_rgba(103,213,255,0.15)]">
                    <svg viewBox="0 0 24 24" fill="none" class="h-8 w-8 text-cyan-400 stroke-current" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1 class="font-display text-2xl font-bold text-white">Reset Master Password</h1>
                <p class="text-sm text-slate-400 text-center">Enter your email and we'll send you a secure link to reset your password.</p>
            </div>

            <!-- Flash Messages -->
            {% if flash %}
            <div class="mb-4 rounded-xl border border-emerald-500/30 bg-emerald-900/30 px-4 py-3 text-sm text-emerald-300">
                {{ flash.message }}
            </div>
            {% endif %}

            <!-- Form -->
            <form method="POST" action="/forgot-password" class="space-y-4">
                <div>
                    <label class="mb-1.5 block text-sm font-medium text-slate-300">Email Address</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                           placeholder="you@example.com"
                           class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                </div>

                <button type="submit"
                        class="mt-2 w-full cursor-pointer rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 py-3 text-sm font-bold text-white shadow-glow-cyan transition hover:opacity-90 hover:scale-[1.01] active:scale-[0.99]">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6 flex justify-between text-sm">
                <a href="/login" class="font-medium text-cyan-400 hover:text-cyan-300 transition">Back to Login</a>
                <a href="/signup" class="font-medium text-slate-400 hover:text-white transition">Sign Up</a>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', (e) => {
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending...';
});
</script>
{% endblock %}
