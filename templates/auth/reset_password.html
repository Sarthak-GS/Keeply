{% extends "layout.html" %}
{% block title %}Reset Password — Vaultify{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="rounded-[2rem] border border-white/10 bg-slate-900/80 p-8 shadow-glow backdrop-blur-xl">

            <!-- Logo -->
            <div class="mb-8 flex flex-col items-center gap-3">
                <div class="flex h-16 w-16 items-center justify-center rounded-full bg-amber-500/10 border border-amber-500/20 shadow-[0_0_30px_rgba(245,158,11,0.15)]">
                    <svg viewBox="0 0 24 24" fill="none" class="h-8 w-8 text-amber-500 stroke-current" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h1 class="font-display text-2xl font-bold text-white">Choose New Password</h1>
                <p class="text-sm text-slate-400 text-center">Set your new master password below.</p>
            </div>

            <!-- Errors -->
            <div id="error-box" class="mb-4 rounded-xl border border-red-500/30 bg-red-900/30 px-4 py-3 text-sm text-red-300 hidden"></div>

            <!-- Form -->
            <form id="reset-password-form" class="space-y-4">
                <input type="hidden" name="token" value="{{ token }}">
                
                <div>
                    <label class="mb-1.5 block text-sm font-medium text-slate-300">New Master Password</label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required autocomplete="new-password"
                               placeholder="••••••••••••"
                               class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-sm text-white placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                        <button type="button" onclick="toggleVisibility('password', this)"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition">👁</button>
                    </div>
                </div>

                <div>
                    <label class="mb-1.5 block text-sm font-medium text-slate-300">Confirm Password</label>
                    <div class="relative">
                        <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password"
                               placeholder="••••••••••••"
                               class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-sm text-white placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                        <button type="button" onclick="toggleVisibility('confirm_password', this)"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition">👁</button>
                    </div>
                </div>

                <button type="submit"
                        class="mt-2 w-full cursor-pointer rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 py-3 text-sm font-bold text-white shadow-glow-cyan transition hover:opacity-90 hover:scale-[1.01] active:scale-[0.99]">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function toggleVisibility(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

let isSubmitting = false;
document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    const errorBox = document.getElementById('error-box');
    errorBox.classList.add('hidden');

    const form = e.target;
    const submitBtn = form.querySelector('button[type="submit"]');
    const origText = submitBtn.innerText;

    isSubmitting = true;
    submitBtn.disabled = true;
    submitBtn.innerText = 'Resetting...';

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    try {
        const response = await fetch('/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        const result = await response.json();
        
        if (response.ok) {
            window.location.href = `/login?msg=${encodeURIComponent(result.message)}&msg_type=success`;
        } else {
            errorBox.textContent = result.detail || 'Failed to reset password.';
            errorBox.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.innerText = origText;
            isSubmitting = false;
        }
    } catch (err) {
        errorBox.textContent = 'Network error, please try again.';
        errorBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.innerText = origText;
        isSubmitting = false;
    }
});
</script>
{% endblock %}
