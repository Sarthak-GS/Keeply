{% extends "layout.html" %}
{% block title %}Login — Vaultify{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="rounded-[2rem] border border-white/10 bg-slate-900/80 p-8 shadow-glow backdrop-blur-xl">

            <!-- Logo -->
            <div class="mb-8 flex flex-col items-center gap-3">
                <div class="flex h-16 w-16 items-center justify-center rounded-full bg-cyan-400/10 border border-cyan-400/20 shadow-[0_0_30px_rgba(103,213,255,0.15)]">
                    <svg viewBox="0 0 24 24" fill="none" class="h-8 w-8 text-cyan-400 stroke-current" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                </div>
                <h1 class="font-display text-2xl font-bold text-white">Welcome back</h1>
                <p class="text-sm text-slate-400">Sign in to your vault</p>
            </div>

            <!-- Flash / Error -->
            {% if flash %}
            <div class="mb-4 rounded-xl border border-emerald-500/30 bg-emerald-900/30 px-4 py-3 text-sm text-emerald-300">
                ✅ {{ flash.message }}
            </div>
            {% endif %}
            {% if error %}
            <div class="mb-4 rounded-xl border border-red-500/30 bg-red-900/30 px-4 py-3 text-sm text-red-300">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <!-- Form -->
            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="mb-1.5 block text-sm font-medium text-slate-300">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                           placeholder="you@example.com"
                           class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                </div>
                <div>
                    <label class="mb-1.5 block text-sm font-medium text-slate-300">Master Password</label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required autocomplete="current-password"
                               placeholder="••••••••••••"
                               class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-sm text-white placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                        <button type="button" onclick="toggleVisibility('password', this)"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition">👁</button>
                    </div>
                </div>

                <button type="submit"
                        class="mt-2 w-full rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 py-3 text-sm font-bold text-white shadow-glow-cyan transition hover:opacity-90 hover:scale-[1.01] active:scale-[0.99]">
                    Sign In
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500">
                Don't have an account?
                <a href="/signup" class="font-medium text-cyan-400 hover:text-cyan-300 transition">Create one</a>
            </p>
        </div>
    </div>
</div>

<script>
function toggleVisibility(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
}
</script>
{% endblock %}
