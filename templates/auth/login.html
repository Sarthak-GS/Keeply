{% extends "layout.html" %}
{% block title %}Login — Keeply{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="rounded-[2rem] border border-white/10 bg-slate-900/80 p-8 shadow-glow backdrop-blur-xl">

            <!-- Logo -->
            <div class="mb-8 flex flex-col items-center gap-3">
                <div class="flex h-16 w-16 items-center justify-center rounded-full bg-cyan-400/10 border border-cyan-400/20 shadow-[0_0_30px_rgba(103,213,255,0.15)]">
                    <svg viewBox="0 0 24 24" fill="none" class="h-8 w-8 text-cyan-400 stroke-current" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                </div>
                <h1 class="font-display text-2xl font-bold text-white">Welcome back</h1>
                <p class="text-sm text-slate-400">Sign in to your vault</p>
            </div>

            <!-- Flash / Error -->
            {% if flash %}
            <div class="mb-4 rounded-xl border border-emerald-500/30 bg-emerald-900/30 px-4 py-3 text-sm text-emerald-300">
                {{ flash.message }}
            </div>
            {% endif %}
            <div id="error-box" class="mb-4 rounded-xl border border-red-500/30 bg-red-900/30 px-4 py-3 text-sm text-red-300 hidden"></div>

            <!-- Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="mb-1.5 block text-sm font-medium text-slate-300">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                           placeholder="you@example.com"
                           class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-sm font-medium text-slate-300">Master Password</label>
                        <a href="/forgot-password" class="text-xs text-cyan-400 hover:text-cyan-300 transition">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <input id="password" name="password" type="password" required autocomplete="current-password"
                               placeholder="••••••••••••"
                               class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 pr-12 text-sm text-white placeholder-slate-500 outline-none transition focus:border-cyan-500/50 focus:ring-2 focus:ring-cyan-500/20">
                        <button type="button" data-toggle="password"
                                class="toggle-pw-btn absolute right-2 top-1/2 -translate-y-1/2 px-2 py-1 text-xs text-slate-400 hover:text-white transition select-none">Show</button>
                    </div>
                </div>

                <button id="login-btn" type="submit"
                        class="mt-2 w-full rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 py-3 text-sm font-bold text-white shadow-glow-cyan transition hover:opacity-90 hover:scale-[1.01] active:scale-[0.99] cursor-pointer">
                    Sign In
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500">
                Don't have an account?
                <a href="/signup" class="font-medium text-cyan-400 hover:text-cyan-300 transition">Create one</a>
            </p>
        </div>
    </div>
</div>

<script src="/static/js/auth_finished.js"></script>
<script>
document.querySelectorAll('.toggle-pw-btn').forEach(btn => {
    btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        const el = document.getElementById(btn.dataset.toggle);
        const start = el.selectionStart;
        const end = el.selectionEnd;
        el.type = el.type === 'password' ? 'text' : 'password';
        btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
        el.focus();
        if (start !== null && end !== null) {
            el.setSelectionRange(start, end);
        }
    });
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('error-box');
    const btn = document.getElementById('login-btn');
    errorBox.classList.add('hidden');

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
        await handleLogin(email, password);
        window.location.href = '/vault/dashboard';
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.textContent = 'Sign In';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
